    // ============================================================
    // Timeline View — fully refactored
    // Design principles:
    //  1. Dynamic height based on visible content (no fixed 1200px)
    //  2. Proper multi-row layout for dense years (no overlap)
    //  3. Clear swimlanes with proper spacing
    //  4. Person bar connects to actual event positions
    //  5. Semantic zoom that actually changes granularity
    //  6. Cluster bubbles that make sense
    // ============================================================
    let timelineSvg, timelineG, timelineZoom;
    let currentEventFilter = '';
    let expandedYears = new Set();
    let timelineZoomLevel = 'year';   // 'year' | 'month' | 'day'
    let timelineAllEventsVisible = false;
    const LANE_HEIGHT = 36;           // vertical spacing per event row
    const EVENT_R = 5;                // base event dot radius
    const ROW_GAP = 4;                // gap between stacked rows

    function getEventColor(d) {
      return groupColor(d._yearGroup);
    }

    function initTimelineView() {
      const container = document.getElementById('timelineView');

      timelineSvg = d3.select('#timelineSvg');
      timelineG = timelineSvg.append('g').attr('class', 'timeline-root');

      timelineZoom = d3.zoom()
        .scaleExtent([0.4, 6])
        .on('zoom', (e) => timelineG.attr('transform', e.transform));
      timelineSvg.call(timelineZoom);

      // Initial draw
      drawTimeline();

      // Search
      document.getElementById('timelineSearch').addEventListener('input', (e) => {
        currentEventFilter = e.target.value.toLowerCase().trim();
        updateTimelineHighlight();
      });

      // Reset
      document.getElementById('timelineReset').addEventListener('click', () => {
        currentEventFilter = '';
        expandedYears.clear();
        timelineZoomLevel = 'year';
        timelineAllEventsVisible = false;
        document.getElementById('timelineSearch').value = '';
        document.querySelectorAll('.timeline-zoom-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.tlZoom === 'year');
        });
        drawTimeline();
        timelineSvg.transition().duration(600).call(timelineZoom.transform, d3.zoomIdentity);
      });

      // Semantic zoom
      document.querySelectorAll('.timeline-zoom-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.timeline-zoom-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          timelineZoomLevel = btn.dataset.tlZoom;
          timelineAllEventsVisible = (timelineZoomLevel === 'day');
          drawTimeline();
          timelineSvg.transition().duration(400).call(timelineZoom.transform, d3.zoomIdentity);
        });
      });

      window.addEventListener('resize', () => drawTimeline());
    }

    function drawTimeline() {
      const container = document.getElementById('timelineView');
      const width = Math.max(container.clientWidth - 4, 800);

      timelineG.selectAll('*').remove();

      // ----- Compute visible events -----
      let visible;
      if (timelineAllEventsVisible) {
        visible = events.slice();
      } else {
        // Auto-expand years with many key events (>=6) to prevent pile-up
        const keyByYear = {};
        events.forEach(e => { if (e._isKey) { const y = e.date.slice(0,4); keyByYear[y] = (keyByYear[y]||0)+1; } });
        const autoExpandYears = new Set(Object.keys(keyByYear).filter(y => keyByYear[y] >= 6));
        const liveExpanded = new Set([...expandedYears, ...autoExpandYears]);
        visible = events.filter(e => e._isKey || liveExpanded.has(e.date.slice(0, 4)));
      }

      // ----- Layout: assign each visible event to a (row, lane) -----
      // Step 1: sort by date
      visible.sort((a, b) => a._parsedDate - b._parsedDate);

      // Step 2: group by year-group (A/B/C) for swimlanes
      const groups = { A: [], B: [], C: [], D: [] };
      visible.forEach(e => {
        const g = (e._yearGroup === 'A' || e._yearGroup === 'B' || e._yearGroup === 'C') ? e._yearGroup : 'D';
        groups[g].push(e);
      });

      // Step 3: within each group, assign rows to avoid overlap
      // Use a greedy algorithm: for each event, find the lowest row where
      // it doesn't overlap (in x-position) with any previously placed event.
      const margin = { top: 140, right: 100, bottom: 60, left: 80 };
      const timeScale = d3.scaleTime().domain(dateExtent).range([margin.left, width - margin.right]);

      // Compute required height first
      let totalRows = 0;
      const groupRowStart = {};
      ['A', 'B', 'C', 'D'].forEach(g => {
        groupRowStart[g] = totalRows;
        // Compute how many rows this group needs
        const evs = groups[g];
        if (evs.length === 0) return;
        const rows = [];
        const minGap = 22; // minimum x distance between dots on same row
        evs.forEach(e => {
          e._x = timeScale(e._parsedDate);
          // Find a row
          let placed = false;
          for (let r = 0; r < rows.length; r++) {
            const lastX = rows[r];
            if (e._x - lastX >= minGap) {
              e._row = r;
              rows[r] = e._x;
              placed = true;
              break;
            }
          }
          if (!placed) {
            e._row = rows.length;
            rows.push(e._x);
          }
        });
        totalRows += rows.length + 1; // +1 for gap between groups
      });

      const groupLaneHeight = LANE_HEIGHT + ROW_GAP;
      const axisY = margin.top + totalRows * (EVENT_R * 2 + 12) + 40;
      const height = axisY + 80;

      timelineSvg.attr('width', width).attr('height', height);

      // Compute Y positions for each event
      visible.forEach(e => {
        const g = (e._yearGroup === 'A' || e._yearGroup === 'B' || e._yearGroup === 'C') ? e._yearGroup : 'D';
        const baseY = margin.top + groupRowStart[g] * (EVENT_R * 2 + 12);
        e._y = baseY + e._row * (EVENT_R * 2 + 10) + EVENT_R + 4;
        e._xFinal = e._x;
      });

      const centerY = axisY - 30; // approximate center for links

      // ----- Sparkline density band -----
      const sparkHeight = 32;
      const sparkY0 = margin.top - sparkHeight - 20;
      const weekBins = d3.bin()
        .value(d => d._parsedDate)
        .thresholds(d3.timeWeek.range(d3.timeWeek.floor(dateExtent[0]), d3.timeWeek.ceil(dateExtent[1])))(events);
      const maxBinCount = d3.max(weekBins, b => b.length) || 1;

      // Axis label
      timelineG.append('text')
        .attr('x', margin.left - 8)
        .attr('y', sparkY0 + sparkHeight / 2 + 4)
        .attr('text-anchor', 'end')
        .style('font-size', '10px')
        .style('fill', 'var(--text-tertiary)')
        .text('密度');

      timelineG.append('line')
        .attr('x1', margin.left).attr('x2', width - margin.right)
        .attr('y1', sparkY0 + sparkHeight + 6).attr('y2', sparkY0 + sparkHeight + 6)
        .attr('stroke', 'var(--border)').attr('opacity', 0.4);

      timelineG.append('g').attr('class', 'density-bars')
        .selectAll('rect').data(weekBins).join('rect')
        .attr('x', d => timeScale(d.x0) + 0.5)
        .attr('y', d => sparkY0 + sparkHeight - (d.length / maxBinCount) * sparkHeight)
        .attr('width', d => Math.max(1, timeScale(d.x1) - timeScale(d.x0) - 1))
        .attr('height', d => (d.length / maxBinCount) * sparkHeight)
        .attr('fill', 'var(--accent)')
        .attr('opacity', 0.5)
        .attr('rx', 1)
        .style('cursor', 'pointer')
        .on('mouseenter', function(event, d) {
          d3.select(this).attr('opacity', 0.9);
          const wLabel = d3.timeFormat('%Y-%m-%d')(d.x0);
          showTimelineTooltip(event, {
            title: `${wLabel} 周 · ${d.length} 个事件`,
            date: '',
            desc: ''
          });
        })
        .on('mousemove', moveTooltip)
        .on('mouseleave', function() {
          d3.select(this).attr('opacity', 0.5);
          hideTooltip();
        });

      // ----- Swimlane backgrounds -----
      const laneGroup = timelineG.append('g').attr('class', 'swimlanes');
      ['A', 'B', 'C', 'D'].forEach(g => {
        const evs = groups[g];
        if (evs.length === 0) return;
        const rows = new Set(evs.map(e => e._row));
        const nRows = rows.size;
        const baseY = margin.top + groupRowStart[g] * (EVENT_R * 2 + 12);
        const topY = baseY - 4;
        const botY = baseY + nRows * (EVENT_R * 2 + 10) + 2;
        const labels = { A: 'A · 1918-1923', B: 'B · 1924-1929', C: 'C · 1930-1933', D: 'D · 其他' };
        const colors = { A: 'var(--group-a)', B: 'var(--group-b)', C: 'var(--group-c)', D: 'var(--text-tertiary)' };

        laneGroup.append('rect')
          .attr('x', margin.left)
          .attr('y', topY)
          .attr('width', width - margin.left - margin.right)
          .attr('height', botY - topY)
          .attr('fill', colors[g])
          .attr('opacity', 0.06)
          .attr('rx', 4);
        laneGroup.append('text')
          .attr('x', margin.left - 8)
          .attr('y', (topY + botY) / 2 + 4)
          .attr('text-anchor', 'end')
          .style('font-size', '10px')
          .style('fill', colors[g])
          .style('font-weight', '600')
          .text(labels[g]);
      });

      // ----- Main axis -----
      let axis;
      if (timelineZoomLevel === 'year') {
        axis = d3.axisBottom(timeScale).ticks(d3.timeYear.every(1)).tickFormat(d3.timeFormat('%Y'));
      } else if (timelineZoomLevel === 'month') {
        axis = d3.axisBottom(timeScale).ticks(d3.timeMonth.every(3)).tickFormat(d3.timeFormat('%Y-%m'));
      } else {
        axis = d3.axisBottom(timeScale).ticks(d3.timeYear.every(1)).tickFormat(d3.timeFormat('%Y'));
      }

      timelineG.append('g')
        .attr('class', 'timeline-axis')
        .attr('transform', `translate(0, ${axisY})`)
        .call(axis)
        .selectAll('text')
        .style('font-size', '12px')
        .attr('dy', '1em');

      timelineG.append('line')
        .attr('class', 'timeline-main-line')
        .attr('x1', margin.left).attr('x2', width - margin.right)
        .attr('y1', axisY).attr('y2', axisY);

      // ----- Year cluster bubbles (for non-expanded, non-auto-expanded years) -----
      const autoExpandYearsSet = new Set(
        Object.keys(
          events.reduce((acc, e) => {
            if (e._isKey) { const y = e.date.slice(0,4); acc[y] = (acc[y]||0)+1; }
            return acc;
          }, {})
        ).filter(y => {
          const cnt = events.filter(e => e._isKey && e.date.slice(0,4) === y).length;
          return cnt >= 6;
        })
      );

      const allYears = Array.from(new Set(events.map(e => e.date.slice(0, 4)))).sort();
      const clusterData = (timelineZoomLevel === 'year' && !timelineAllEventsVisible)
        ? allYears.filter(y => !expandedYears.has(y) && !autoExpandYearsSet.has(y)).map(y => {
            const yearEvents = events.filter(e => e.date.slice(0, 4) === y);
            const shown = yearEvents.filter(e => e._isKey).length;
            const hidden = yearEvents.length - shown;
            return { year: y, total: yearEvents.length, shown, hidden,
                     x: timeScale(parseDate(y + '-06-15')) };
          }).filter(d => d.hidden > 0)
        : [];

      const clusterG = timelineG.append('g').attr('class', 'year-clusters');
      const ycSel = clusterG.selectAll('g').data(clusterData).join('g')
        .attr('class', 'year-cluster')
        .attr('transform', d => `translate(${d.x}, ${axisY - 20})`)
        .style('cursor', 'pointer');

      ycSel.append('circle')
        .attr('r', d => 11 + Math.min(Math.sqrt(d.hidden), 8))
        .attr('fill', 'var(--surface-2)')
        .attr('stroke', 'var(--text-tertiary)')
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '3,2');
      ycSel.append('text')
        .attr('text-anchor', 'middle').attr('dy', 4)
        .style('font-size', '9px').style('fill', 'var(--text-secondary)')
        .style('font-weight', '600')
        .text(d => `+${d.hidden}`);

      ycSel.on('mouseenter', function(event, d) {
        d3.select(this).select('circle').attr('stroke', 'var(--accent)').attr('stroke-width', 1.5);
        showTimelineTooltip(event, {
          title: `${d.year} 年 · 共 ${d.total} 个事件`,
          date: '点击展开全部',
          desc: `当前显示 ${d.shown} 个关键事件，还有 ${d.hidden} 个事件隐藏`
        });
      })
      .on('mousemove', moveTooltip)
      .on('mouseleave', function() {
        d3.select(this).select('circle').attr('stroke', 'var(--text-tertiary)').attr('stroke-width', 1);
        hideTooltip();
      })
      .on('click', (event, d) => {
        expandedYears.add(d.year);
        drawTimeline();
      });

      // ----- Causal links (simple, subtle) -----
      const visibleEids = new Set(visible.map(e => e.eid));
      const links = [];
      visible.forEach(e => {
        (e.caused_by || []).forEach(c => {
          if (visibleEids.has(c.eid)) links.push({ source: c.eid, target: e.eid, type: c.type });
        });
      });

      timelineG.append('g').attr('class', 'causal-links')
        .selectAll('path').data(links).join('path')
        .attr('class', d => `causal-link ${d.type === 'INFERRED' ? 'inferred' : ''}`)
        .attr('d', d => {
          const s = eventMap.get(d.source);
          const t = eventMap.get(d.target);
          if (!s || !s._y || !t || !t._y) return '';
          const sx = s._xFinal, sy = s._y;
          const tx = t._xFinal, ty = t._y;
          const midY = (sy + ty) / 2 + 15;
          return `M${sx},${sy} C${sx},${midY} ${tx},${midY} ${tx},${ty}`;
        })
        .attr('fill', 'none')
        .attr('stroke', 'var(--text-tertiary)')
        .attr('stroke-width', 0.8)
        .attr('stroke-dasharray', d => d.type === 'INFERRED' ? '3,3' : 'none')
        .attr('opacity', 0.2);

      // ----- Event nodes -----
      const nodes = timelineG.append('g').attr('class', 'event-nodes')
        .selectAll('g').data(visible).join('g')
        .attr('class', 'event-node')
        .attr('transform', d => `translate(${d._xFinal}, ${d._y})`)
        .style('cursor', 'pointer')
        .on('click', (event, d) => {
          event.stopPropagation();
          renderEventDetail(d);
        })
        .on('mouseenter', function(event, d) {
          d3.select(this).select('circle').attr('stroke', 'var(--accent)').attr('stroke-width', 2.5);
          if (typeof currentDetailEid !== 'undefined' && currentDetailEid === d.eid) return;
          showTimelineTooltip(event, d);
        })
        .on('mousemove', moveTooltip)
        .on('mouseleave', function() {
          d3.select(this).select('circle').attr('stroke', 'var(--surface)').attr('stroke-width', 2);
          hideTooltip();
        });

      nodes.append('circle')
        .attr('r', d => EVENT_R + d._importance * 4)
        .attr('fill', d => getEventColor(d))
        .attr('stroke', 'var(--surface)')
        .attr('stroke-width', 2)
        .attr('opacity', d => d._isKey ? 1 : 0.65);

      // Labels: show for key events in year zoom, more in month/day
      const shouldShowLabel = d => {
        if (timelineZoomLevel === 'year') return d._isKey;
        if (timelineZoomLevel === 'month') return d._isKey || d._importance > 0.2;
        return true;
      };

      const labelSel = nodes.filter(shouldShowLabel).append('text')
        .attr('class', 'event-label')
        .attr('y', d => -(EVENT_R + d._importance * 4) - 5)
        .attr('text-anchor', 'middle')
        .style('font-size', '10px')
        .style('fill', 'var(--text-secondary)')
        .style('pointer-events', 'none')
        .style('paint-order', 'stroke')
        .style('stroke', 'var(--bg)')
        .style('stroke-width', '3px')
        .style('stroke-linejoin', 'round')
        .text(d => {
          const t = d.title;
          const maxLen = timelineZoomLevel === 'day' ? 16 : 12;
          return t.length > maxLen ? t.slice(0, maxLen) + '…' : t;
        });

      // Label overlap removal
      const labelData = [];
      labelSel.nodes().forEach(el => {
        const parent = d3.select(el.parentNode);
        const d = parent.datum();
        const bb = el.getBBox();
        const tr = parent.attr('transform');
        const m = /translate\(([\d.\-]+),([\d.\-]+)\)/.exec(tr);
        if (!m) return;
        const ox = +m[1], oy = +m[2];
        const r = EVENT_R + d._importance * 4;
        labelData.push({ el, x: ox + bb.x - 2, y: oy - r - 5 + bb.y, w: bb.width + 4, h: bb.height });
      });
      // Sort by x then greedy hide
      labelData.sort((a, b) => a.x - b.x);
      const placed = [];
      labelData.forEach(lb => {
        let overlap = false;
        for (const p of placed) {
          if (lb.x < p.x + p.w && lb.x + lb.w > p.x && lb.y < p.y + p.h && lb.y + lb.h > p.y) {
            overlap = true; break;
          }
        }
        if (overlap) { d3.select(lb.el).style('opacity', 0); }
        else { placed.push(lb); }
      });
    }

    function showTimelineTooltip(event, d) {
      // Reset tooltip from any person-mode state
      tooltip.className = 'tooltip';
      tooltip.innerHTML = `
        <div class="tooltip-title"></div>
        <div class="tooltip-date"></div>
        <div class="tooltip-desc"></div>
      `;
      tooltip.querySelector('.tooltip-title').textContent = d.title || '';
      tooltip.querySelector('.tooltip-date').textContent = d.date || '';
      tooltip.querySelector('.tooltip-desc').textContent = d.desc ? (d.desc.length > 120 ? d.desc.slice(0, 120) + '…' : d.desc) : '';
      tooltip.classList.add('visible');
      moveTooltip(event);
    }

    function updateTimelineHighlight() {
      if (!currentEventFilter) {
        d3.selectAll('.event-node').classed('dimmed', false);
        d3.selectAll('.causal-link').classed('dimmed', false);
        d3.selectAll('.year-cluster').classed('dimmed', false);
        return;
      }
      const term = currentEventFilter;
      d3.selectAll('.event-node').classed('dimmed', function(d) {
        const match = (d.title || '').toLowerCase().includes(term) ||
                      (d.desc || '').toLowerCase().includes(term) ||
                      (d.date || '').includes(term) ||
                      (d.actors || []).some(pid => {
                        const p = peopleMap.get(pid);
                        return p && p.name.toLowerCase().includes(term);
                      });
        return !match;
      });
      d3.selectAll('.causal-link').classed('dimmed', true);
    }

    function highlightPersonInTimeline(pid) {
      d3.selectAll('.event-node').classed('dimmed', d => !(d.actors || []).includes(pid));
      d3.selectAll('.causal-link').classed('dimmed', true);
    }

    function resetTimelineHighlight() {
      if (currentEventFilter) { updateTimelineHighlight(); return; }
      d3.selectAll('.event-node').classed('dimmed', false);
      d3.selectAll('.causal-link').classed('dimmed', false);
    }

    function redrawTimeline() {
      if (typeof timelineSvg === 'undefined' || !timelineSvg) return;
      drawTimeline();
    }


    // ============================================================
    // Network View — Canvas + d3.force (optimized)
    // - Larger virtual coordinate space (not bounded to canvas)
    // - Stronger repulsion, bigger collision radius for separation
    // - Person nodes separated from events by y-force bands
    // - Thinner, dimmer actor links; causal links slightly stronger
    // - Auto fit-to-view after simulation settles
    // ============================================================
    let networkInitialized = false;
    let networkCtx, networkCanvas;
    let networkNodes = [], networkLinks = [], networkAdj = new Map();
    let networkSim = null;
    let networkTransform = d3.zoomIdentity;
    let networkAnimationId = null;
    let networkHovered = null;
    let networkDragging = null;
    let networkDragMoved = false;
    let networkDragStart = null;
    let networkSimulating = true;
    let offscreenLinkCanvas = null;
    let offscreenCtx = null;
    let minimapCanvas, minimapCtx;
    let networkWidth = 0, networkHeight = 0;
    let networkViewBox = { minX: 0, minY: 0, maxX: 1, maxY: 1 };
    let spriteCache = new Map();
    let networkInitialFit = false;

    function nodeColorVar(n) {
      if (n.type === 'person') return '--person';
      return n.data._yearGroup === 'A' ? '--group-a' : n.data._yearGroup === 'B' ? '--group-b' : '--group-c';
    }

    function makeNodeSprite(n) {
      const dpr = window.devicePixelRatio || 1;
      const pad = 4;
      const extra = n.type === 'person' ? 4 : (n.data._isKey ? 4 : 2);
      const size = Math.ceil((n.r + pad + extra) * 2 * dpr);
      const cv = document.createElement('canvas');
      cv.width = cv.height = size;
      const c = cv.getContext('2d');
      c.scale(dpr, dpr);
      const cx = size / dpr / 2, cy = size / dpr / 2;
      const color = getCssVar(nodeColorVar(n));
      if (n.type === 'person') {
        const g = c.createRadialGradient(cx - n.r * 0.3, cy - n.r * 0.3, 1, cx, cy, n.r);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(0.25, color);
        g.addColorStop(1, color);
        c.fillStyle = g;
      } else if (n.data._isKey) {
        const g = c.createRadialGradient(cx, cy, n.r * 0.3, cx, cy, n.r + 4);
        g.addColorStop(0, color);
        g.addColorStop(0.7, color);
        g.addColorStop(1, color + '00');
        c.fillStyle = g;
        c.beginPath();
        c.arc(cx, cy, n.r + 4, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = color;
      } else {
        c.fillStyle = color;
      }
      c.beginPath();
      c.arc(cx, cy, n.r, 0, Math.PI * 2);
      c.fill();
      if (n.type === 'person') {
        c.strokeStyle = getCssVar('--surface');
        c.lineWidth = 2.5;
        c.stroke();
      } else if (n.data._isKey) {
        c.strokeStyle = 'rgba(255,255,255,0.8)';
        c.lineWidth = 1.5;
        c.stroke();
      }
      return cv;
    }

    function resizeNetworkCanvas() {
      if (!networkCanvas) return;
      const rect = networkCanvas.getBoundingClientRect();
      networkWidth = Math.max(rect.width || 900, 600);
      networkHeight = Math.max(rect.height || 500, 400);
      const dpr = window.devicePixelRatio || 1;
      networkCanvas.width = networkWidth * dpr;
      networkCanvas.height = networkHeight * dpr;
      networkCanvas.style.width = networkWidth + 'px';
      networkCanvas.style.height = networkHeight + 'px';
      if (offscreenLinkCanvas) {
        offscreenLinkCanvas.width = networkCanvas.width;
        offscreenLinkCanvas.height = networkCanvas.height;
        renderLinksToOffscreen();
      }
      if (minimapCanvas) {
        const mw = 200, mh = 140;
        minimapCanvas.style.width = mw + 'px';
        minimapCanvas.style.height = mh + 'px';
        minimapCanvas.width = mw * dpr;
        minimapCanvas.height = mh * dpr;
        minimapCtx = minimapCanvas.getContext('2d');
        minimapCtx.scale(dpr, dpr);
        renderMinimap();
      }
    }

    function fitNetworkToView(padding) {
      padding = padding || 60;
      if (networkNodes.length === 0) return;
      // Compute bounding box weighted toward important nodes (people + key events)
      // so that initial view focuses on the main structure, not outlier tiny nodes.
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      networkNodes.forEach(n => {
        const isImportant = n.type === 'person' || n.data._isKey;
        const weight = isImportant ? 1 : 0.5;
        if (weight > 0.3) {
          if (n.x < minX) minX = n.x;
          if (n.y < minY) minY = n.y;
          if (n.x > maxX) maxX = n.x;
          if (n.y > maxY) maxY = n.y;
        }
      });
      // Include all nodes to ensure nothing important is cut off
      networkNodes.forEach(n => {
        if (n.type === 'person') {
          if (n.x < minX) minX = n.x;
          if (n.y < minY) minY = n.y;
          if (n.x > maxX) maxX = n.x;
          if (n.y > maxY) maxY = n.y;
        }
      });
      const bw = maxX - minX, bh = maxY - minY;
      if (bw < 10 || bh < 10) return;
      networkViewBox = { minX, minY, maxX, maxY };
      let k = Math.min((networkWidth - padding * 2) / bw, (networkHeight - padding * 2) / bh) * 0.9;
      k = Math.max(k, 0.28); // Don't zoom out so far that nodes become invisible
      const tx = networkWidth / 2 - (minX + bw / 2) * k;
      const ty = networkHeight / 2 - (minY + bh / 2) * k;
      networkTransform = d3.zoomIdentity.translate(tx, ty).scale(k);
      renderLinksToOffscreen();
    }

    function initNetworkView() {
      networkInitialized = true;
      networkCanvas = document.getElementById('networkCanvas');
      resizeNetworkCanvas();
      networkCtx = networkCanvas.getContext('2d', { alpha: false });
      minimapCanvas = document.getElementById('networkMinimap');

      prepareNetworkData();
      buildAdjacency();

      offscreenLinkCanvas = document.createElement('canvas');
      offscreenLinkCanvas.width = networkCanvas.width;
      offscreenLinkCanvas.height = networkCanvas.height;
      offscreenCtx = offscreenLinkCanvas.getContext('2d');

      // ---- Determine virtual layout space ----
      // Balance: enough room for force separation, but not so large that fit-to-view makes nodes tiny.
      // Target: initial zoom k ≈ 0.35-0.45, so person nodes (r=10-14) appear 4-6px on screen.
      const yearSpan = (dateExtent[1].getTime() - dateExtent[0].getTime()) / (365.25 * 86400000);
      const pxPerYear = 140;
      const layoutWidth = Math.max(2200, yearSpan * pxPerYear);
      const layoutHeight = Math.max(900, networkHeight * 1.6);
      const layoutCenterX = layoutWidth / 2;
      const eventBandY = layoutHeight * 0.5;
      const personBandTop = layoutHeight * 0.1;
      const personBandBottom = layoutHeight * 0.9;

      const ts = d3.scaleTime().domain(dateExtent).range([150, layoutWidth - 150]);

      // Compute per-year event density to determine vertical spread
      const yearCounts = {};
      events.forEach(e => {
        const y = e.date.slice(0, 4);
        yearCounts[y] = (yearCounts[y] || 0) + 1;
      });
      const maxYearCount = Math.max(...Object.values(yearCounts));

      // Pre-compute person average event dates and determine band (top/bottom)
      const personAvgX = new Map();
      const personBand = new Map(); // 'top' or 'bottom'
      const sortedPeople = people.slice().sort((a, b) => (b._eventCount || 0) - (a._eventCount || 0));
      sortedPeople.forEach((p, i) => {
        const pes = events.filter(e => (e.actors || []).includes(p.pid));
        if (pes.length > 0) {
          personAvgX.set(p.pid, ts(new Date(d3.mean(pes, e => e._parsedDate.getTime()))));
        } else {
          personAvgX.set(p.pid, layoutCenterX + (Math.random() - 0.5) * 300);
        }
        personBand.set(p.pid, i % 2 === 0 ? 'top' : 'bottom');
      });

      networkNodes.forEach(n => {
        if (n.type === 'event') {
          const year = n.data.date.slice(0, 4);
          const count = yearCounts[year] || 1;
          const densityFactor = Math.min(count / maxYearCount, 1);
          const spread = 80 + densityFactor * 220;
          n.x = ts(n.data._parsedDate) + (Math.random() - 0.5) * (30 + densityFactor * 80);
          n.y = eventBandY + (Math.random() - 0.5) * spread;
          if (n.data._isKey) {
            n.y = eventBandY + (Math.random() - 0.5) * spread * 0.5;
          }
        } else {
          const avgX = personAvgX.get(n.id);
          n.x = avgX + (Math.random() - 0.5) * 100;
          const band = personBand.get(n.id);
          if (band === 'top') {
            n.y = personBandTop + (Math.random() - 0.5) * 80;
          } else {
            n.y = personBandBottom - (Math.random() - 0.5) * 80;
          }
        }
      });

      // ---- Force simulation ----
      networkSim = d3.forceSimulation(networkNodes)
        .force('link', d3.forceLink(networkLinks)
          .id(d => d.id)
          .distance(l => {
            if (l.type === 'ACTOR') return 110;
            return 70;
          })
          .strength(l => {
            if (l.type === 'ACTOR') return 0.015;
            if (l.type === 'INFERRED') return 0.05;
            return 0.12;
          }))
        .force('charge', d3.forceManyBody()
          .strength(d => {
            if (d.type === 'person') {
              if (d.degree > 30) return -500;
              if (d.degree > 15) return -350;
              if (d.degree > 5) return -200;
              return -100;
            }
            if (d.data._isKey) return -150;
            if (d.degree > 5) return -50;
            return -15;
          })
          .distanceMax(400)
          .theta(0.9))
        .force('collide', d3.forceCollide()
          .radius(d => d.r + (d.type === 'person' ? 10 : (d.data._isKey ? 8 : 3)))
          .iterations(3)
          .strength(0.9))
        .force('x', d3.forceX(d => {
          if (d.type === 'event') return ts(d.data._parsedDate);
          return personAvgX.get(d.id) || layoutCenterX;
        }).strength(d => {
          if (d.type === 'event') return d.data._isKey ? 0.05 : 0.02;
          return 0.05;
        }))
        .force('y', d3.forceY(d => {
          if (d.type === 'event') return eventBandY;
          const band = personBand.get(d.id);
          return band === 'top' ? personBandTop : personBandBottom;
        }).strength(d => {
          if (d.type === 'event') return d.data._isKey ? 0.02 : 0.005;
          return 0.1;
        }))
        .force('center', d3.forceCenter(layoutCenterX, eventBandY).strength(0.005))
        .alphaDecay(0.015)
        .velocityDecay(0.4)
        .on('tick', () => {
          // Soft bounds within layout space
          const pad = 40;
          networkNodes.forEach(n => {
            if (n.x < pad) n.x = pad;
            if (n.x > layoutWidth - pad) n.x = layoutWidth - pad;
            if (n.y < pad) n.y = pad;
            if (n.y > layoutHeight - pad) n.y = layoutHeight - pad;
          });
          // Render links less frequently when alpha is low (performance)
          const a = networkSim.alpha();
          if (a > 0.3) {
            if (!networkSim._linkTick || networkSim._linkTick % 3 === 0) renderLinksToOffscreen();
            networkSim._linkTick = (networkSim._linkTick || 0) + 1;
          } else if (!networkSim._linkRendered) {
            renderLinksToOffscreen();
            networkSim._linkRendered = true;
          }
          // Auto fit-to-view once when simulation cools down enough
          if (!networkInitialFit && a < 0.05) {
            networkInitialFit = true;
            fitNetworkToView(70);
          }
        });

      // Build sprite cache
      spriteCache = new Map();
      networkNodes.forEach(n => spriteCache.set(n.id, makeNodeSprite(n)));

      setupNetworkInteractions();

      document.getElementById('networkReset').addEventListener('click', () => {
        networkSim.alpha(0.6).restart();
        networkInitialFit = false;
        networkSim._linkRendered = false;
      });

      const pauseBtn = document.getElementById('networkPause');
      pauseBtn.addEventListener('click', () => {
        networkSimulating = !networkSimulating;
        if (networkSimulating) {
          networkSim.alphaTarget(0.02).restart();
          pauseBtn.textContent = '暂停模拟';
        } else {
          networkSim.alphaTarget(0);
          pauseBtn.textContent = '继续模拟';
        }
      });

      document.getElementById('networkFit').addEventListener('click', () => {
        fitNetworkToView(60);
      });

      document.getElementById('networkSearch').addEventListener('input', (e) => {
        const term = e.target.value.trim().toLowerCase();
        if (!term) { networkHovered = null; spriteCache = new Map(networkNodes.map(n => [n.id, makeNodeSprite(n)])); return; }
        const matched = networkNodes.find(n => n.label.toLowerCase().includes(term));
        if (matched) {
          networkHovered = matched;
          if (networkSim) networkSim.alpha(0.15).restart();
          // Zoom to node
          const k = Math.max(networkTransform.k, 1.3);
          const tx = networkWidth / 2 - matched.x * k;
          const ty = networkHeight / 2 - matched.y * k;
          networkTransform = d3.zoomIdentity.translate(tx, ty).scale(k);
          renderLinksToOffscreen();
        }
      });

      window.addEventListener('resize', () => {
        resizeNetworkCanvas();
      });
    }

    function buildAdjacency() {
      networkAdj = new Map();
      networkLinks.forEach(l => {
        const s = l.source.id || l.source, t = l.target.id || l.target;
        if (!networkAdj.has(s)) networkAdj.set(s, new Set());
        if (!networkAdj.has(t)) networkAdj.set(t, new Set());
        networkAdj.get(s).add(t);
        networkAdj.get(t).add(s);
      });
      networkNodes.forEach(n => {
        n.degree = networkAdj.get(n.id)?.size || 0;
      });
    }

    function prepareNetworkData() {
      networkNodes = [];
      networkLinks = [];

      const refCount = new Map();
      events.forEach(e => {
        (e.caused_by || []).forEach(c => {
          refCount.set(c.eid, (refCount.get(c.eid) || 0) + 1);
        });
      });

      events.forEach(e => {
        const outLinks = (e.caused_by || []).length;
        const inLinks = refCount.get(e.eid) || 0;
        const totalLinks = outLinks + inLinks;
        const importance = e._isKey ? Math.min(1, 0.4 + totalLinks / 20) : Math.min(1, totalLinks / 15);
        networkNodes.push({
          id: e.eid,
          type: 'event',
          data: e,
          label: e.title,
          r: e._isKey ? (7 + importance * 6) : (3.5 + importance * 3),
          degree: totalLinks
        });
      });
      people.forEach(p => {
        const cnt = p._eventCount || 0;
        networkNodes.push({
          id: p.pid,
          type: 'person',
          data: p,
          label: p.name,
          r: cnt > 30 ? 16 : cnt > 15 ? 13 : cnt > 5 ? 10 : 7,
          degree: cnt
        });
      });

      const nodeMap = new Map(networkNodes.map(n => [n.id, n]));

      events.forEach(e => {
        (e.caused_by || []).forEach(c => {
          const src = nodeMap.get(c.eid);
          const tgt = nodeMap.get(e.eid);
          if (src && tgt) networkLinks.push({ source: src, target: tgt, type: c.type || 'EXPLICIT' });
        });
        (e.actors || []).forEach(pid => {
          const src = nodeMap.get(e.eid);
          const tgt = nodeMap.get(pid);
          if (src && tgt) networkLinks.push({ source: src, target: tgt, type: 'ACTOR' });
        });
      });
    }

    function renderLinksToOffscreen() {
      if (!offscreenCtx) return;
      const dpr = window.devicePixelRatio || 1;
      offscreenCtx.clearRect(0, 0, offscreenLinkCanvas.width, offscreenLinkCanvas.height);
      offscreenCtx.save();
      offscreenCtx.scale(dpr, dpr);
      offscreenCtx.translate(networkTransform.x, networkTransform.y);
      offscreenCtx.scale(networkTransform.k, networkTransform.k);

      const personCol = getCssVar('--person');
      const accent = getCssVar('--accent');
      const textTer = getCssVar('--text-tertiary');
      const groupA = getCssVar('--group-a');
      const groupB = getCssVar('--group-b');
      const groupC = getCssVar('--group-c');

      // Batch links by type
      const actors = [], explicit = [], inferred = [];
      networkLinks.forEach(l => {
        if (l.type === 'ACTOR') actors.push(l);
        else if (l.type === 'INFERRED') inferred.push(l);
        else explicit.push(l);
      });

      // 1) Actor links (thinnest, very faint)
      const linkK = Math.max(networkTransform.k, 0.2);
      offscreenCtx.strokeStyle = personCol;
      offscreenCtx.lineWidth = 0.5 / linkK;
      offscreenCtx.globalAlpha = 0.08;
      offscreenCtx.beginPath();
      actors.forEach(l => {
        offscreenCtx.moveTo(l.source.x, l.source.y);
        offscreenCtx.lineTo(l.target.x, l.target.y);
      });
      offscreenCtx.stroke();

      // 2) Inferred causal links (dashed, faint)
      offscreenCtx.strokeStyle = textTer;
      offscreenCtx.lineWidth = 0.7 / linkK;
      offscreenCtx.globalAlpha = 0.18;
      offscreenCtx.setLineDash([4 / linkK, 3 / linkK]);
      offscreenCtx.beginPath();
      inferred.forEach(l => {
        offscreenCtx.moveTo(l.source.x, l.source.y);
        offscreenCtx.lineTo(l.target.x, l.target.y);
      });
      offscreenCtx.stroke();
      offscreenCtx.setLineDash([]);

      // 3) Explicit causal links (color-matched to source year group)
      offscreenCtx.lineWidth = 1.0 / linkK;
      offscreenCtx.globalAlpha = 0.3;
      offscreenCtx.beginPath();
      explicit.forEach(l => {
        const sg = l.source.data ? l.source.data._yearGroup : null;
        offscreenCtx.strokeStyle = sg === 'A' ? groupA : sg === 'B' ? groupB : groupC;
        offscreenCtx.moveTo(l.source.x, l.source.y);
        offscreenCtx.lineTo(l.target.x, l.target.y);
        offscreenCtx.stroke();
      });

      offscreenCtx.restore();
    }

    function setupNetworkInteractions() {
      const zoom = d3.zoom()
        .scaleExtent([0.08, 8])
        .filter(event => {
          // Allow zoom from wheel/touch always; from mousedown only when NOT on a node
          if (event.type === 'mousedown') {
            const w = pointerToWorld(event);
            const found = findNodeAt(w.x, w.y);
            return !found; // don't start zoom-pan if on a node
          }
          return true;
        })
        .on('zoom', (e) => {
          networkTransform = e.transform;
          renderLinksToOffscreen();
        });
      d3.select(networkCanvas).call(zoom);

      function pointerToWorld(event) {
        const [mx, my] = d3.pointer(event, networkCanvas);
        return { x: (mx - networkTransform.x) / networkTransform.k, y: (my - networkTransform.y) / networkTransform.k };
      }

      function findNodeAt(wx, wy) {
        let best = null, bestD2 = Infinity;
        for (const n of networkNodes) {
          const dx = wx - n.x, dy = wy - n.y;
          const hitR = n.r + (n.type === 'person' ? 10 : 6);
          const d2 = dx * dx + dy * dy;
          if (d2 < hitR * hitR && d2 < bestD2) { best = n; bestD2 = d2; }
        }
        return best;
      }

      d3.select(networkCanvas)
        .on('mousemove', (event) => {
          const w = pointerToWorld(event);
          if (networkDragging) {
            networkDragging.fx = w.x;
            networkDragging.fy = w.y;
            networkDragMoved = true;
            if (networkSim) networkSim.alphaTarget(0.2).restart();
            return;
          }
          const hovered = findNodeAt(w.x, w.y);
          if (hovered !== networkHovered) {
            networkHovered = hovered;
            networkCanvas.style.cursor = hovered ? 'pointer' : 'grab';
          }
          if (hovered) {
            if (hovered.type === 'event' && typeof currentDetailEid !== 'undefined' && currentDetailEid === hovered.data.eid) {
              hideTooltip();
            } else if (hovered.type === 'person' && typeof currentDetailPid !== 'undefined' && currentDetailPid === hovered.data.pid) {
              hideTooltip();
            } else if (hovered.type === 'person') {
              showPersonHoverCard(event, hovered.data);
            } else {
              showTooltip(event, hovered.data.title, hovered.data.date, hovered.data.desc);
            }
          } else {
            hideTooltip();
          }
        })
        .on('mousedown', (event) => {
          const w = pointerToWorld(event);
          const found = findNodeAt(w.x, w.y);
          if (found) {
            event.stopPropagation();
            event.preventDefault();
            networkDragging = found;
            networkDragMoved = false;
            networkDragStart = { x: w.x, y: w.y };
            found.fx = found.x;
            found.fy = found.y;
            if (networkSim) networkSim.alphaTarget(0.25).restart();
          }
        })
        .on('mouseup', (event) => {
          if (networkDragging) {
            if (networkSim) networkSim.alphaTarget(networkSimulating ? 0.02 : 0);
            networkDragging.fx = null;
            networkDragging.fy = null;
            const clickedNode = networkDragging;
            const wasDrag = networkDragMoved;
            networkDragging = null;
            networkDragMoved = false;
            if (!wasDrag) {
              if (clickedNode.type === 'event') {
                renderEventDetail(clickedNode.data);
              } else {
                if (typeof showPersonDetail === 'function') {
                  showPersonDetail(clickedNode.data);
                }
              }
            }
          }
        })
        .on('dblclick.zoom', null)
        .on('mouseleave', () => { hideTooltip(); });
    }

    function getHoveredNeighbors() {
      if (!networkHovered) return null;
      return networkAdj.get(networkHovered.id) || new Set();
    }

    function renderNetwork() {
      if (!networkCtx) return;
      const ctx = networkCtx;
      const dpr = window.devicePixelRatio || 1;
      ctx.save();
      ctx.fillStyle = getCssVar('--surface');
      ctx.fillRect(0, 0, networkCanvas.width, networkCanvas.height);
      ctx.scale(dpr, dpr);
      ctx.save();
      ctx.translate(networkTransform.x, networkTransform.y);
      ctx.scale(networkTransform.k, networkTransform.k);

      // Links
      if (offscreenLinkCanvas) ctx.drawImage(offscreenLinkCanvas, 0, 0, networkWidth, networkHeight);

      const nbrs = getHoveredNeighbors();
      const accent = getCssVar('--accent');

      // Highlight connected links on hover
      if (networkHovered) {
        ctx.save();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2.0 / Math.max(networkTransform.k, 0.3);
        ctx.globalAlpha = 0.85;
        ctx.beginPath();
        networkLinks.forEach(l => {
          const s = l.source, t = l.target;
          if (s === networkHovered || t === networkHovered) {
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(t.x, t.y);
          }
        });
        ctx.stroke();
        ctx.restore();
      }

      // Draw nodes: sort so person nodes and key events draw on top
      const sorted = networkNodes.slice().sort((a, b) => {
        const sa = a.type === 'person' ? 2 : (a.data._isKey ? 1 : 0);
        const sb = b.type === 'person' ? 2 : (b.data._isKey ? 1 : 0);
        return sa - sb;
      });

      for (const n of sorted) {
        const isHovered = networkHovered === n;
        const isNeighbor = nbrs && nbrs.has(n.id);
        const dimmed = networkHovered && !isHovered && !isNeighbor;
        ctx.globalAlpha = dimmed ? 0.18 : 1;

        const sprite = spriteCache.get(n.id);
        if (sprite) {
          const pad = 4;
          const extra = n.type === 'person' ? 4 : (n.data._isKey ? 4 : 2);
          const sz = (n.r + pad + extra) * 2;
          ctx.drawImage(sprite, n.x - n.r - pad - extra, n.y - n.r - pad - extra, sz, sz);
        }
        if (isHovered) {
          ctx.globalAlpha = 1;
          ctx.strokeStyle = accent;
          ctx.lineWidth = 2.5 / Math.max(networkTransform.k, 0.3);
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r + 4, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;

      // Labels - adaptive based on zoom level
      const labels = [];
      const k = networkTransform.k;
      for (const n of networkNodes) {
        const isHovered = networkHovered === n;
        const isNeighbor = nbrs && nbrs.has(n.id);
        let show = false;
        if (isHovered) {
          show = true;
        } else if (n.type === 'person') {
          // At overview, only show most prominent people; progressively show more when zoomed
          if (k < 0.4) show = isNeighbor || n.degree >= 25;
          else if (k < 0.7) show = isNeighbor || n.degree >= 15;
          else if (k < 1.2) show = isNeighbor || n.degree >= 8;
          else show = true;
        } else {
          if (k < 0.4) show = (n.data._isKey && n.degree >= 5) || n.degree >= 10;
          else if (k < 0.7) show = (isNeighbor && k >= 0.5) || (n.data._isKey && n.degree >= 3) || n.degree >= 6;
          else if (k < 1.2) show = isNeighbor || n.data._isKey || n.degree >= 3;
          else show = true;
        }
        if (!show) continue;
        const maxLen = k < 0.5 ? 12 : k < 1.0 ? 16 : 22;
        const text = n.label.length > maxLen ? n.label.slice(0, maxLen) + '…' : n.label;
        labels.push({ n, text, priority: isHovered ? 4 : (isNeighbor ? 3 : (n.type === 'person' ? 2 : (n.data._isKey ? 2 : 1))) });
      }
      labels.sort((a, b) => b.priority - a.priority || b.n.degree - a.n.degree);

      const fontSize = Math.max(9, Math.min(13, 11 / Math.max(networkTransform.k, 0.3)));
      ctx.font = `${fontSize}px ${getComputedStyle(document.body).fontFamily}`;
      ctx.textBaseline = 'middle';

      const placedBoxes = [];
      for (const l of labels) {
        const isHovered = networkHovered === l.n;
        const isNeighbor = nbrs && nbrs.has(l.n.id);
        const opacity = isHovered ? 1 : isNeighbor ? 0.9 : (l.priority >= 1 ? 0.85 : 0.6);
        const tw = ctx.measureText(l.text).width;
        const pad = 3;
        const bh = fontSize + 4;
        const offset = 6 / Math.max(networkTransform.k, 0.3);
        const candidates = [
          { x: l.n.x + l.n.r + offset, y: l.n.y, anchor: 'left' },
          { x: l.n.x - l.n.r - offset, y: l.n.y, anchor: 'right' },
          { x: l.n.x, y: l.n.y - l.n.r - offset - 4, anchor: 'center' },
          { x: l.n.x, y: l.n.y + l.n.r + offset + bh / 2, anchor: 'center' }
        ];
        let drawn = false;
        for (const c of candidates) {
          let bx, by;
          if (c.anchor === 'left') { bx = c.x - pad; }
          else if (c.anchor === 'right') { bx = c.x - tw - pad; }
          else { bx = c.x - tw / 2 - pad; }
          by = c.y - bh / 2;
          const box = { x: bx, y: by, w: tw + pad * 2, h: bh };
          let overlap = false;
          for (const p of placedBoxes) {
            if (box.x < p.x + p.w && box.x + box.w > p.x && box.y < p.y + p.h && box.y + box.h > p.y) { overlap = true; break; }
          }
          if (overlap) continue;
          // Label background
          ctx.fillStyle = getCssVar('--surface');
          ctx.globalAlpha = opacity * 0.88;
          const r = 3;
          ctx.beginPath();
          ctx.moveTo(box.x + r, box.y);
          ctx.arcTo(box.x + box.w, box.y, box.x + box.w, box.y + box.h, r);
          ctx.arcTo(box.x + box.w, box.y + box.h, box.x, box.y + box.h, r);
          ctx.arcTo(box.x, box.y + box.h, box.x, box.y, r);
          ctx.arcTo(box.x, box.y, box.x + box.w, box.y, r);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = isHovered ? accent : getCssVar('--border');
          ctx.lineWidth = 0.8 / Math.max(networkTransform.k, 0.3);
          ctx.globalAlpha = opacity;
          ctx.stroke();
          ctx.fillStyle = isHovered ? accent : getCssVar('--text');
          ctx.textAlign = c.anchor;
          ctx.globalAlpha = opacity;
          ctx.fillText(l.text, c.x, c.y + 1);
          placedBoxes.push(box);
          drawn = true;
          break;
        }
      }
      ctx.restore();
      ctx.restore();
    }

    function renderMinimap() {
      if (!minimapCtx || networkNodes.length === 0) return;
      const mw = 200, mh = 140;
      minimapCtx.clearRect(0, 0, mw, mh);
      minimapCtx.fillStyle = getCssVar('--surface-2');
      minimapCtx.fillRect(0, 0, mw, mh);
      const xs = networkNodes.map(n => n.x);
      const ys = networkNodes.map(n => n.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const w = maxX - minX || 1, h = maxY - minY || 1;
      const pad = 8;
      const scale = Math.min((mw - pad * 2) / w, (mh - pad * 2) / h);
      const ox = pad + (mw - pad * 2 - w * scale) / 2 - minX * scale;
      const oy = pad + (mh - pad * 2 - h * scale) / 2 - minY * scale;

      minimapCtx.lineWidth = 0.3;
      minimapCtx.strokeStyle = getCssVar('--border');
      minimapCtx.globalAlpha = 0.3;
      minimapCtx.beginPath();
      networkLinks.forEach(l => {
        minimapCtx.moveTo(ox + l.source.x * scale, oy + l.source.y * scale);
        minimapCtx.lineTo(ox + l.target.x * scale, oy + l.target.y * scale);
      });
      minimapCtx.stroke();

      networkNodes.forEach(n => {
        const px = ox + n.x * scale, py = oy + n.y * scale;
        minimapCtx.fillStyle = getCssVar(n.type === 'person' ? '--person' :
          (n.data._yearGroup === 'A' ? '--group-a' : n.data._yearGroup === 'B' ? '--group-b' : '--group-c'));
        minimapCtx.globalAlpha = n.type === 'person' ? 0.9 : 0.6;
        const r = Math.max(0.7, n.r * scale * 0.3 + (n.type === 'person' ? 1 : 0.4));
        minimapCtx.beginPath();
        minimapCtx.arc(px, py, r, 0, Math.PI * 2);
        minimapCtx.fill();
      });

      // Viewport rectangle
      const vw = networkWidth / networkTransform.k;
      const vh = networkHeight / networkTransform.k;
      const vx = -networkTransform.x / networkTransform.k;
      const vy = -networkTransform.y / networkTransform.k;
      minimapCtx.strokeStyle = getCssVar('--accent');
      minimapCtx.lineWidth = 1.5;
      minimapCtx.globalAlpha = 1;
      minimapCtx.strokeRect(ox + vx * scale, oy + vy * scale, vw * scale, vh * scale);
    }

    function networkLoop() {
      renderNetwork();
      renderMinimap();
      networkAnimationId = requestAnimationFrame(networkLoop);
    }


    // ============================================================
    // Path View + Person Detail + Global Init (refactored)
    // ============================================================
    let pathRootEvent = null;

    function redrawPath() {
      const container = document.getElementById('pathView');
      const width = Math.max(container.clientWidth || window.innerWidth, 700);
      const height = Math.max(container.clientHeight || 500, 400);
      const svg = d3.select('#pathSvg').attr('width', width).attr('height', height);
      svg.selectAll('*').remove();

      if (!pathRootEvent) {
        svg.append('text')
          .attr('x', width / 2).attr('y', height / 2)
          .attr('text-anchor', 'middle')
          .style('fill', 'var(--text-tertiary)')
          .style('font-size', '14px')
          .text('在任意视图中点击事件，然后点击「查看因果路径」按钮');
        return;
      }

      // BFS trace
      const upstream = traceUpstream(pathRootEvent, 3);
      const downstream = traceDownstream(pathRootEvent, 3);
      // Deduplicate while preserving order
      const seen = new Set([pathRootEvent.eid]);
      const pathEvents = [pathRootEvent];
      [...upstream, ...downstream].forEach(e => {
        if (!seen.has(e.eid)) { seen.add(e.eid); pathEvents.push(e); }
      });
      const pathEids = new Set(pathEvents.map(e => e.eid));

      const margin = { top: 90, right: 40, bottom: 70, left: 40 };
      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;

      const localExtent = d3.extent(pathEvents, e => e._parsedDate);
      const localSpan = localExtent[1].getTime() - localExtent[0].getTime();
      const pad = Math.max(localSpan * 0.12, 1000 * 60 * 60 * 24 * 45);
      const paddedExtent = [
        new Date(localExtent[0].getTime() - pad),
        new Date(localExtent[1].getTime() + pad)
      ];
      const timeScale = d3.scaleTime().domain(paddedExtent).nice().range([margin.left, width - margin.right]);

      // Assign layers: root at center, upstream above, downstream below
      // Use a layered approach: compute depth via BFS for vertical spread
      const upDepths = new Map();
      const downDepths = new Map();
      upDepths.set(pathRootEvent.eid, 0);
      downDepths.set(pathRootEvent.eid, 0);
      function bfs(start, depMap, direction) {
        const q = [start];
        while (q.length) {
          const cur = q.shift();
          const d = depMap.get(cur.eid);
          let neighbors;
          if (direction === 'up') {
            neighbors = (cur.caused_by || []).map(c => eventMap.get(c.eid)).filter(Boolean).filter(e => pathEids.has(e.eid));
          } else {
            neighbors = events.filter(e => pathEids.has(e.eid) && (e.caused_by || []).some(c => c.eid === cur.eid));
          }
          neighbors.forEach(n => {
            if (!depMap.has(n.eid)) { depMap.set(n.eid, d + 1); q.push(n); }
          });
        }
      }
      bfs(pathRootEvent, upDepths, 'up');
      bfs(pathRootEvent, downDepths, 'down');

      const maxUpDepth = d3.max([...upDepths.values()]) || 1;
      const maxDownDepth = d3.max([...downDepths.values()]) || 1;

      pathEvents.forEach(e => {
        e._x = timeScale(e._parsedDate);
        if (e.eid === pathRootEvent.eid) {
          e._y = height / 2;
          e._layer = 'root';
          e._depth = 0;
        } else if (upDepths.has(e.eid) && e._parsedDate < pathRootEvent._parsedDate) {
          const d = upDepths.get(e.eid) || 1;
          e._y = margin.top + 20 + (d / Math.max(maxUpDepth, 1)) * (innerH / 2 - 50);
          e._layer = 'up';
          e._depth = d;
        } else {
          const d = downDepths.get(e.eid) || 1;
          e._y = height / 2 + 30 + (d / Math.max(maxDownDepth, 1)) * (innerH / 2 - 50);
          e._layer = 'down';
          e._depth = d;
        }
        e.x = e._x;
        e.y = e._y;
      });

      // Force collision for nice spacing
      const pathSim = d3.forceSimulation(pathEvents)
        .force('x', d3.forceX(d => d._x).strength(0.7))
        .force('y', d3.forceY(d => d._y).strength(0.5))
        .force('collide', d3.forceCollide(22).iterations(4).strength(0.8))
        .stop();
      for (let i = 0; i < 300; i++) pathSim.tick();

      pathEvents.forEach(e => {
        e.x = Math.max(margin.left + 16, Math.min(width - margin.right - 16, e.x));
        if (e._layer === 'root') e.y = height / 2;
        else if (e._layer === 'up') e.y = Math.max(margin.top + 20, Math.min(height / 2 - 35, e.y));
        else e.y = Math.max(height / 2 + 35, Math.min(height - margin.bottom - 20, e.y));
      });

      // Build links
      const links = [];
      pathEvents.forEach(e => {
        (e.caused_by || []).forEach(c => {
          if (pathEids.has(c.eid)) links.push({ source: c.eid, target: e.eid, type: c.type || 'EXPLICIT' });
        });
      });

      // Defs for arrows
      const defs = svg.append('defs');
      defs.append('marker').attr('id', 'arrow-explicit-path').attr('viewBox', '0 -5 10 10')
        .attr('refX', 14).attr('refY', 0).attr('markerWidth', 7).attr('markerHeight', 7).attr('orient', 'auto')
        .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', 'var(--accent)');
      defs.append('marker').attr('id', 'arrow-inferred-path').attr('viewBox', '0 -5 10 10')
        .attr('refX', 14).attr('refY', 0).attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto')
        .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', 'var(--text-tertiary)');

      // Background bands
      svg.append('rect').attr('x', margin.left).attr('y', margin.top)
        .attr('width', innerW).attr('height', height / 2 - margin.top - 25)
        .attr('fill', 'var(--surface-2)').attr('opacity', 0.3).attr('rx', 8);
      svg.append('rect').attr('x', margin.left).attr('y', height / 2 + 25)
        .attr('width', innerW).attr('height', height - margin.bottom - (height / 2 + 25))
        .attr('fill', 'var(--surface-2)').attr('opacity', 0.3).attr('rx', 8);

      // Labels
      svg.append('text').attr('x', margin.left + 10).attr('y', margin.top - 8)
        .style('fill', 'var(--text-tertiary)').style('font-size', '11px').style('font-weight', '600')
        .style('letter-spacing', '0.1em').text('▲ 前因事件');
      svg.append('text').attr('x', width - margin.right - 10).attr('y', height - margin.bottom + 30)
        .attr('text-anchor', 'end').style('fill', 'var(--text-tertiary)').style('font-size', '11px')
        .style('font-weight', '600').style('letter-spacing', '0.1em').text('▼ 后果事件 ▼');

      // Root event label
      svg.append('text').attr('x', width / 2).attr('y', height / 2 - 28)
        .attr('text-anchor', 'middle').style('fill', 'var(--accent)').style('font-size', '11px')
        .style('font-weight', '600').text('根事件');

      // Time axis
      const tickSpan = paddedExtent[1].getTime() - paddedExtent[0].getTime();
      const day = 1000 * 60 * 60 * 24;
      let axisTicks, tickFmt;
      if (tickSpan < 120 * day) { axisTicks = d3.timeWeek.every(2); tickFmt = d3.timeFormat('%Y-%m'); }
      else if (tickSpan < 365 * day * 3) { axisTicks = d3.timeMonth.every(2); tickFmt = d3.timeFormat('%Y-%m'); }
      else { axisTicks = d3.timeYear.every(1); tickFmt = d3.timeFormat('%Y'); }

      svg.append('g').attr('transform', `translate(0, ${margin.top - 20})`)
        .call(d3.axisTop(timeScale).ticks(axisTicks).tickFormat(tickFmt))
        .selectAll('text').style('font-size', '10px').style('fill', 'var(--text-tertiary)');

      // Links
      svg.append('g').selectAll('path').data(links).join('path')
        .attr('d', d => {
          const s = pathEvents.find(e => e.eid === d.source);
          const t = pathEvents.find(e => e.eid === d.target);
          if (!s || !t) return '';
          const my = (s.y + t.y) / 2;
          return `M${s.x},${s.y} C${s.x},${my} ${t.x},${my} ${t.x},${t.y}`;
        })
        .attr('fill', 'none')
        .attr('stroke', d => d.type === 'INFERRED' ? 'var(--text-tertiary)' : 'var(--accent)')
        .attr('stroke-width', d => d.type === 'INFERRED' ? 1.2 : 1.8)
        .attr('stroke-opacity', 0.5)
        .attr('stroke-dasharray', d => d.type === 'INFERRED' ? '4,3' : 'none')
        .attr('marker-end', d => d.type === 'INFERRED' ? 'url(#arrow-inferred-path)' : 'url(#arrow-explicit-path)');

      // Nodes
      const nodeG = svg.append('g').selectAll('g').data(pathEvents).join('g')
        .attr('transform', d => `translate(${d.x}, ${d.y})`)
        .style('cursor', 'pointer');

      nodeG.append('circle')
        .attr('r', d => d.eid === pathRootEvent.eid ? 12 : 7)
        .attr('fill', d => getEventColor(d))
        .attr('stroke', d => d.eid === pathRootEvent.eid ? 'var(--accent)' : 'var(--surface)')
        .attr('stroke-width', d => d.eid === pathRootEvent.eid ? 3 : 2);

      nodeG.append('text')
        .attr('text-anchor', 'middle')
        .attr('y', d => d.eid === pathRootEvent.eid ? -20 : -13)
        .style('font-size', d => d.eid === pathRootEvent.eid ? '12px' : '10px')
        .style('font-weight', d => d.eid === pathRootEvent.eid ? 600 : 400)
        .style('fill', 'var(--text)')
        .style('paint-order', 'stroke')
        .style('stroke', 'var(--surface)')
        .style('stroke-width', '3px')
        .style('stroke-linejoin', 'round')
        .text(d => {
          const t = d.title;
          return t.length > 14 ? t.slice(0, 14) + '…' : t;
        });

      nodeG
        .on('click', (event, d) => {
          event.stopPropagation();
          renderEventDetail(d);
        })
        .on('mouseenter', function(event, d) {
          d3.select(this).select('circle').attr('stroke', 'var(--accent)').attr('stroke-width', 3);
          if (typeof currentDetailEid !== 'undefined' && currentDetailEid === d.eid) return;
          showTooltip(event, d.title, d.date, d.desc);
        })
        .on('mousemove', moveTooltip)
        .on('mouseleave', function(event, d) {
          d3.select(this).select('circle')
            .attr('stroke', d.eid === pathRootEvent.eid ? 'var(--accent)' : 'var(--surface)')
            .attr('stroke-width', d.eid === pathRootEvent.eid ? 3 : 2);
          hideTooltip();
        });
    }

    function traceUpstream(event, depth) {
      if (depth <= 0) return [];
      const result = [];
      const seen = new Set([event.eid]);
      function recurse(e, d) {
        if (d <= 0) return;
        (e.caused_by || []).forEach(c => {
          const src = eventMap.get(c.eid);
          if (src && !seen.has(src.eid)) {
            seen.add(src.eid);
            result.push(src);
            recurse(src, d - 1);
          }
        });
      }
      recurse(event, depth);
      return result;
    }

    function traceDownstream(event, depth) {
      if (depth <= 0) return [];
      const result = [];
      const seen = new Set([event.eid]);
      function recurse(e, d) {
        if (d <= 0) return;
        events.filter(ev => (ev.caused_by || []).some(c => c.eid === e.eid)).forEach(ev => {
          if (!seen.has(ev.eid)) {
            seen.add(ev.eid);
            result.push(ev);
            recurse(ev, d - 1);
          }
        });
      }
      recurse(event, depth);
      return result;
    }

    document.getElementById('pathReset').addEventListener('click', () => {
      pathRootEvent = null;
      redrawPath();
    });

    window.addEventListener('resize', () => {
      if (document.getElementById('pathView').classList.contains('active')) redrawPath();
    });

    // ============================================================
function clearPath() {
  pathRootEvent = null;
  redrawPath();
}

    initAll();
  </script>
</body>
